name: Rebuild from RSS

on:
  schedule:
    - cron: '0 15 * * *'  # Daily at 15:00 UTC (00:00 KST)
  push:
    branches: [main]
    paths-ignore:
      - 'index.html'
      - 'posts/**'
      - 'sitemap.xml'
      - 'robots.txt'
      - '**.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rebuild
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install --no-package-lock

      - name: Build
        run: node scripts/build.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html posts sitemap.xml robots.txt
          if git diff --staged --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "rebuild: sync from RSS $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi
