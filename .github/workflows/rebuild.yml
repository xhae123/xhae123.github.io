name: Rebuild from Issues

on:
  # Posts are closed GitHub Issues authored by the owner (minus `excluded`).
  # Publish = close, edit = edit body, unpublish = reopen / add `excluded` / delete.
  issues:
    types: [closed, reopened, edited, deleted, labeled, unlabeled]
  # Rebuild when the generator or assets change (but not the generated output).
  push:
    branches: [main]
    paths-ignore:
      - 'index.html'
      - 'posts/**'
      - 'sitemap.xml'
      - 'robots.txt'
      - '**.md'
  workflow_dispatch:

permissions:
  contents: write
  issues: read

concurrency:
  group: rebuild
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install --no-package-lock

      - name: Build
        run: node scripts/build.js
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A index.html posts sitemap.xml robots.txt assets
          if git diff --staged --quiet; then
            echo "No changes — skipping commit."
          else
            git commit -m "rebuild: sync from issues $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi
