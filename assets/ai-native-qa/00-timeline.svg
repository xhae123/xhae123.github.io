<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560">
  <!-- background -->
  <rect x="0.5" y="0.5" width="1199" height="559" rx="12" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>

  <!-- header -->
  <text x="64" y="60" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" letter-spacing="2" fill="#A3A3A3">00 — TIMELINE</text>
  <text x="64" y="102" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="34" font-weight="700" fill="#0A0A0A">글로 남은 궤적</text>

  <!-- timeline base line -->
  <line x1="115" y1="300" x2="1085" y2="300" stroke="#E5E5E5" stroke-width="1"/>

  <!-- ================= NODE 1 (above) x=160 ================= -->
  <line x1="160" y1="294" x2="160" y2="268" stroke="#E5E5E5" stroke-width="1"/>
  <text x="160" y="170" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" letter-spacing="2" fill="#A3A3A3">MAR 23</text>
  <text x="160" y="199" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="16" font-weight="600" fill="#0A0A0A">명세 프롬프트는 코드와</text>
  <text x="160" y="221" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="16" font-weight="600" fill="#0A0A0A">구별되지 않는다</text>
  <text x="160" y="251" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="13" fill="#737373">프롬프트를 코드처럼 다루기 시작</text>
  <circle cx="160" cy="300" r="6" fill="#FFFFFF" stroke="#A3A3A3" stroke-width="2"/>

  <!-- ================= NODE 2 (below) x=338 ================= -->
  <line x1="338" y1="306" x2="338" y2="332" stroke="#E5E5E5" stroke-width="1"/>
  <text x="338" y="349" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" letter-spacing="2" fill="#A3A3A3">APR 23</text>
  <text x="338" y="378" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="16" font-weight="600" fill="#0A0A0A">인간관계를 자동화 해보자</text>
  <text x="338" y="405" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="13" fill="#737373">에이전트를 카톡 앞에 앉히다</text>
  <circle cx="338" cy="300" r="6" fill="#FFFFFF" stroke="#A3A3A3" stroke-width="2"/>

  <!-- ================= NODE 3 (above) x=516 ================= -->
  <line x1="516" y1="294" x2="516" y2="268" stroke="#E5E5E5" stroke-width="1"/>
  <text x="516" y="185" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" letter-spacing="2" fill="#A3A3A3">JUN 03</text>
  <text x="516" y="214" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="16" font-weight="600" fill="#0A0A0A">운영 DB 옮기기</text>
  <text x="516" y="244" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="13" fill="#737373">되돌릴 수 없는 버튼과 확신</text>
  <circle cx="516" cy="300" r="6" fill="#FFFFFF" stroke="#A3A3A3" stroke-width="2"/>

  <!-- ================= NODE 4 (below) x=694 ================= -->
  <line x1="694" y1="306" x2="694" y2="332" stroke="#E5E5E5" stroke-width="1"/>
  <text x="694" y="349" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" letter-spacing="2" fill="#A3A3A3">JUL 08</text>
  <text x="694" y="378" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="16" font-weight="600" fill="#0A0A0A">예쁘게를 코드로 옮기는 법</text>
  <text x="694" y="405" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="13" fill="#737373">만들기의 비용이 0이 되는 체감</text>
  <circle cx="694" cy="300" r="6" fill="#FFFFFF" stroke="#A3A3A3" stroke-width="2"/>

  <!-- ================= NODE 5 (above) x=872 — de-highlighted, normal ================= -->
  <line x1="872" y1="294" x2="872" y2="268" stroke="#E5E5E5" stroke-width="1"/>
  <text x="872" y="170" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" letter-spacing="2" fill="#A3A3A3">JUL 16</text>
  <text x="872" y="199" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="16" font-weight="600" fill="#0A0A0A">사내 테크톡:</text>
  <text x="872" y="221" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="16" font-weight="600" fill="#0A0A0A">AI-Native QA</text>
  <text x="872" y="251" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="13" fill="#737373">검증을 시스템으로 만들다</text>
  <circle cx="872" cy="300" r="6" fill="#FFFFFF" stroke="#A3A3A3" stroke-width="2"/>

  <!-- ================= NODE 6 (below) x=1050 — highlighted ================= -->
  <line x1="1050" y1="306" x2="1050" y2="332" stroke="#E5E5E5" stroke-width="1"/>
  <text x="1050" y="346" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" letter-spacing="2" fill="#A3A3A3">JUL 24</text>
  <text x="1050" y="374" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="16" font-weight="600" fill="#4F46E5">사내 타운홀:</text>
  <text x="1050" y="396" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="16" font-weight="600" fill="#4F46E5">만드는 건 쉬웠고</text>
  <text x="1050" y="418" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="16" font-weight="600" fill="#4F46E5">푸는 건 어려웠다</text>
  <text x="1050" y="448" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="13" fill="#737373">6개월을 정리하다</text>
  <circle cx="1050" cy="300" r="24" fill="#EEF2FF"/>
  <circle cx="1050" cy="300" r="9" fill="#4F46E5"/>

  <!-- footnote -->
  <text x="600" y="516" text-anchor="middle" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="15" fill="#737373">회고는 결과가 아니라 궤적을 남기는 글이라고 생각합니다</text>
</svg>
