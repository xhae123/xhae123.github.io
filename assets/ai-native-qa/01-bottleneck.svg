<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="병목은 사라지지 않았다. 이동했을 뿐이다">
  <!-- background -->
  <rect x="0" y="0" width="1200" height="675" rx="12" fill="#FFFFFF"/>
  <rect x="0.5" y="0.5" width="1199" height="674" rx="12" fill="none" stroke="#E5E5E5" stroke-width="1"/>

  <!-- number tag -->
  <text x="64" y="72" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" letter-spacing="3" fill="#A3A3A3">01 — BOTTLENECK</text>

  <!-- title -->
  <text x="64" y="120" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-weight="700" font-size="36" fill="#0A0A0A">병목은 사라지지 않았다. 이동했을 뿐이다</text>

  <!-- ============ BEFORE AI ============ -->
  <rect x="64" y="173" width="9" height="9" rx="2" fill="#A3A3A3"/>
  <text x="84" y="181" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" letter-spacing="3" fill="#737373">BEFORE AI</text>
  <text x="200" y="181" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="14" fill="#A3A3A3">AI 이전</text>

  <!-- bar 1: 코드 작성 (long) -->
  <text x="64" y="212" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="14" fill="#737373">코드 작성</text>
  <rect x="64" y="222" width="750" height="34" rx="5" fill="#737373"/>
  <text x="830" y="238" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" letter-spacing="1" fill="#0A0A0A">75%</text>
  <text x="830" y="254" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" letter-spacing="2" fill="#A3A3A3">MOST OF THE TIME</text>

  <!-- bar 2: 검증 · 테스트 · 리뷰 (short) -->
  <text x="64" y="290" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="14" fill="#737373">검증 · 테스트 · 리뷰</text>
  <rect x="64" y="300" width="200" height="34" rx="5" fill="#F5F5F5" stroke="#E5E5E5" stroke-width="1"/>
  <text x="280" y="322" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" letter-spacing="1" fill="#A3A3A3">20%</text>

  <!-- ============ transition ============ -->
  <line x1="80.5" y1="350" x2="80.5" y2="372" stroke="#A3A3A3" stroke-width="1.5"/>
  <polyline points="73,364 80.5,372 88,364" fill="none" stroke="#A3A3A3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="104" y="367" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" letter-spacing="2" fill="#737373">THE SHIFT — 병목의 이동</text>

  <!-- ============ AFTER AI ============ -->
  <rect x="64" y="395" width="9" height="9" rx="2" fill="#4F46E5"/>
  <text x="84" y="403" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" letter-spacing="3" fill="#737373">AFTER AI</text>
  <text x="196" y="403" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="14" fill="#A3A3A3">AI 이후</text>

  <!-- bar 1: 코드 작성 (short) -->
  <text x="64" y="434" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="14" fill="#737373">코드 작성</text>
  <rect x="64" y="444" width="200" height="34" rx="5" fill="#737373"/>
  <text x="280" y="466" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" letter-spacing="1" fill="#A3A3A3">20%</text>

  <!-- bar 2: 검증 · 테스트 · 리뷰 (long, accent) -->
  <text x="64" y="512" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="14" fill="#737373">검증 · 테스트 · 리뷰</text>
  <rect x="64" y="522" width="750" height="34" rx="5" fill="#4F46E5"/>
  <text x="830" y="538" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" letter-spacing="1" fill="#4F46E5">75%</text>
  <text x="830" y="554" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="11" letter-spacing="2" fill="#737373">THE NEW BOTTLENECK</text>

  <!-- footnote -->
  <line x1="64" y1="578" x2="1136" y2="578" stroke="#E5E5E5" stroke-width="1"/>
  <text x="64" y="604" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="15" fill="#737373">빠르게 만든다 ≠ 빠르게 내보낸다 — 속도는 쉽고, 확신이 어렵다</text>
</svg>
