<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <!-- background -->
  <rect x="0.5" y="0.5" width="1199" height="674" rx="12" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>

  <!-- header -->
  <text x="64" y="76" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" letter-spacing="2.5" fill="#A3A3A3">02 — AI-NATIVE</text>
  <text x="64" y="120" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="36" font-weight="700" fill="#0A0A0A">AI-assisted와 AI-native는 다르다</text>

  <!-- header divider -->
  <line x1="64" y1="160" x2="1136" y2="160" stroke="#E5E5E5" stroke-width="1"/>

  <!-- center vertical divider -->
  <line x1="600" y1="200" x2="600" y2="490" stroke="#E5E5E5" stroke-width="1"/>

  <!-- ================= LEFT COLUMN : AI-ASSISTED ================= -->
  <text x="96" y="220" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" letter-spacing="2.5" fill="#A3A3A3">AI-ASSISTED</text>

  <text x="96" y="262" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="22" font-weight="700" fill="#0A0A0A">사람의 프로세스를 AI가 돕는다</text>

  <text x="96" y="308" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="15" fill="#737373">
    <tspan x="96" dy="0">QA 프로세스는 사람 모양 그대로다.</tspan>
    <tspan x="96" dy="26">AI는 테스트 코드를 만들고 결과를 요약하지만,</tspan>
    <tspan x="96" dy="26">실행과 판단에 쓰이는 시간은 여전히 사람의 것이다.</tspan>
  </text>

  <rect x="96" y="418" width="444" height="52" rx="8" fill="#F5F5F5"/>
  <text x="120" y="450" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" letter-spacing="2" fill="#737373">SPEED LIMIT — 사람의 손</text>

  <!-- ================= RIGHT COLUMN : AI-NATIVE ================= -->
  <text x="648" y="220" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" letter-spacing="2.5" fill="#4F46E5">AI-NATIVE</text>

  <text x="648" y="262" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="22" font-weight="700" fill="#0A0A0A">AI를 중심으로 재설계한다</text>

  <text x="648" y="308" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="15" fill="#737373">
    <tspan x="648" dy="0">AI가 일하고, 사람은 승인한다.</tspan>
    <tspan x="648" dy="26">사람의 시간은 판단에만 쓰인다.</tspan>
  </text>

  <rect x="648" y="418" width="456" height="52" rx="8" fill="#EEF2FF"/>
  <text x="672" y="450" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" letter-spacing="2" fill="#4F46E5">SPEED LIMIT — AI의 손</text>

  <!-- footnote divider -->
  <line x1="64" y1="524" x2="1136" y2="524" stroke="#E5E5E5" stroke-width="1"/>

  <!-- footnote -->
  <text x="64" y="578" font-family="Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif" font-size="16" fill="#0A0A0A">
    <tspan>AI가 테스트 코드를 써도 사람이 돌리고 판단한다면, </tspan><tspan fill="#4F46E5">병목은 아직 이동하지 않은 것이다</tspan>
  </text>
</svg>
