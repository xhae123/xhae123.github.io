<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <style>
      .label { font-family: Pretendard, 'Apple SD Gothic Neo', -apple-system, sans-serif; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace; }
    </style>
  </defs>

  <!-- background -->
  <rect x="0.5" y="0.5" width="1199" height="674" rx="12" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>

  <!-- header -->
  <text class="mono" x="48" y="56" font-size="12" fill="#A3A3A3" letter-spacing="2">05 — ITERATIONS</text>
  <text class="label" x="48" y="104" font-size="34" font-weight="700" fill="#0A0A0A">네 번째 Jerry</text>

  <!-- ============ CARD 1 (x=48) ============ -->
  <rect x="48" y="180" width="252" height="300" rx="10" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
  <text class="mono" x="72" y="216" font-size="11" fill="#737373" letter-spacing="2">JERRY #1</text>
  <text class="mono" x="147" y="216" font-size="14" fill="#A3A3A3">†</text>
  <text class="label" x="72" y="262" font-size="18" font-weight="600" fill="#0A0A0A">Docker 컨테이너</text>
  <text class="mono" x="72" y="342" font-size="22" fill="#0A0A0A" letter-spacing="1">9일</text>
  <text class="mono" x="72" y="402" font-size="10" fill="#A3A3A3" letter-spacing="2">사인(死因)</text>
  <text class="label" x="72" y="426" font-size="15" fill="#737373">눈이 없다</text>

  <!-- ============ CARD 2 (x=332) ============ -->
  <rect x="332" y="180" width="252" height="300" rx="10" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
  <text class="mono" x="356" y="216" font-size="11" fill="#737373" letter-spacing="2">JERRY #2</text>
  <text class="mono" x="431" y="216" font-size="14" fill="#A3A3A3">†</text>
  <text class="label" x="356" y="262" font-size="18" font-weight="600" fill="#0A0A0A">macOS VM</text>
  <text class="mono" x="356" y="342" font-size="22" fill="#0A0A0A" letter-spacing="1">5주</text>
  <text class="mono" x="356" y="402" font-size="10" fill="#A3A3A3" letter-spacing="2">사인(死因)</text>
  <text class="label" x="356" y="426" font-size="15" fill="#737373">격리 불가</text>

  <!-- ============ CARD 3 (x=616) ============ -->
  <rect x="616" y="180" width="252" height="300" rx="10" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
  <text class="mono" x="640" y="216" font-size="11" fill="#737373" letter-spacing="2">JERRY #3</text>
  <text class="mono" x="715" y="216" font-size="14" fill="#A3A3A3">†</text>
  <text class="label" x="640" y="262" font-size="18" font-weight="600" fill="#0A0A0A">큐 · 팩토리 · 디스패처</text>
  <text class="mono" x="640" y="342" font-size="22" fill="#0A0A0A" letter-spacing="1">한 달</text>
  <text class="mono" x="640" y="402" font-size="10" fill="#A3A3A3" letter-spacing="2">사인(死因)</text>
  <text class="label" x="640" y="426" font-size="15" fill="#737373">상태 둘 곳이 없다</text>

  <!-- ============ CARD 4 (x=900) — highlighted ============ -->
  <rect x="900" y="180" width="252" height="300" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text class="mono" x="924" y="216" font-size="11" fill="#4F46E5" letter-spacing="2">JERRY #4</text>
  <text class="label" x="924" y="262" font-size="18" font-weight="600" fill="#0A0A0A">브라우저 + VLM</text>
  <text class="mono" x="924" y="342" font-size="22" fill="#4F46E5" letter-spacing="1">진행 중</text>
  <text class="label" x="924" y="398" font-size="13" fill="#737373">'모든 QA'에서 웹</text>
  <text class="label" x="924" y="418" font-size="13" fill="#737373">탐색적 QA 하나로</text>

  <!-- ============ connectors ============ -->
  <line x1="174" y1="480" x2="174" y2="560" stroke="#E5E5E5" stroke-width="1"/>
  <line x1="458" y1="480" x2="458" y2="560" stroke="#E5E5E5" stroke-width="1"/>
  <line x1="742" y1="480" x2="742" y2="560" stroke="#E5E5E5" stroke-width="1"/>
  <line x1="1026" y1="480" x2="1026" y2="560" stroke="#4F46E5" stroke-width="1.5"/>

  <!-- ============ timeline axis ============ -->
  <line x1="48" y1="560" x2="1152" y2="560" stroke="#E5E5E5" stroke-width="1"/>
  <circle cx="174" cy="560" r="3" fill="#A3A3A3"/>
  <circle cx="458" cy="560" r="3" fill="#A3A3A3"/>
  <circle cx="742" cy="560" r="3" fill="#A3A3A3"/>
  <circle cx="1026" cy="560" r="3.5" fill="#4F46E5"/>

  <text class="mono" x="48" y="590" font-size="12" fill="#A3A3A3" letter-spacing="2">입사</text>
  <text class="mono" x="1152" y="590" font-size="12" fill="#A3A3A3" letter-spacing="2" text-anchor="end">오늘</text>

  <!-- ============ footnote ============ -->
  <text class="label" x="48" y="644" font-size="15" fill="#737373">빨리 버린 것이 이 프로젝트의 유일한 강점이었습니다</text>
</svg>
