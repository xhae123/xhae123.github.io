<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" width="720" height="430" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif" role="img" aria-label="4레이어 파이프라인 구조: 수급 선별 집필 조립, 각 단계의 산출물 파일이 곧 상태이고 사람은 검수 지점에 붙는다">
  <rect width="720" height="430" fill="#fcfcfb"/>

  <text x="32" y="34" font-size="17" font-weight="600" fill="#1a1a19">파이프라인 4레이어</text>
  <text x="32" y="56" font-size="13" fill="#5c5b55">상태를 기록하지 않는다 — 디렉토리에 어떤 파일이 있는지가 곧 상태다</text>

  <defs>
    <marker id="ax" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#8a8980"/>
    </marker>
  </defs>

  <!-- stages -->
  <g font-size="12.5">
    <rect x="32" y="86" width="146" height="62" rx="7" fill="#ffffff" stroke="#2a78d6" stroke-width="1.5"/>
    <text x="105" y="108" text-anchor="middle" font-weight="600" fill="#1a1a19">[1] 수급</text>
    <text x="105" y="127" text-anchor="middle" fill="#5c5b55">스크립트 · LLM 0</text>
    <text x="105" y="142" text-anchor="middle" font-size="11" fill="#8a8980">벤더 178곳 피드</text>

    <path d="M184 117 L204 117" stroke="#8a8980" stroke-width="1.5" marker-end="url(#ax)"/>

    <rect x="210" y="86" width="146" height="62" rx="7" fill="#ffffff" stroke="#eb6834" stroke-width="1.5"/>
    <text x="283" y="108" text-anchor="middle" font-weight="600" fill="#1a1a19">[2] 선별</text>
    <text x="283" y="127" text-anchor="middle" fill="#5c5b55">Haiku · 일괄</text>
    <text x="283" y="142" text-anchor="middle" font-size="11" fill="#8a8980">게이트 G1~G5</text>

    <path d="M362 117 L382 117" stroke="#8a8980" stroke-width="1.5" marker-end="url(#ax)"/>

    <rect x="388" y="86" width="146" height="62" rx="7" fill="#ffffff" stroke="#4a3aa7" stroke-width="1.5"/>
    <text x="461" y="108" text-anchor="middle" font-weight="600" fill="#1a1a19">[3] 집필</text>
    <text x="461" y="127" text-anchor="middle" fill="#5c5b55">Sonnet · 글당 1개</text>
    <text x="461" y="142" text-anchor="middle" font-size="11" fill="#8a8980">원문 정독 → 카드</text>

    <path d="M540 117 L560 117" stroke="#8a8980" stroke-width="1.5" marker-end="url(#ax)"/>

    <rect x="566" y="86" width="122" height="62" rx="7" fill="#ffffff" stroke="#1baf7a" stroke-width="1.5"/>
    <text x="627" y="108" text-anchor="middle" font-weight="600" fill="#1a1a19">[4] 조립</text>
    <text x="627" y="127" text-anchor="middle" fill="#5c5b55">스크립트 · LLM 0</text>
    <text x="627" y="142" text-anchor="middle" font-size="11" fill="#8a8980">DB → 서빙</text>
  </g>

  <!-- artifacts -->
  <text x="32" y="184" font-size="12.5" font-weight="600" fill="#1a1a19">산출물 = 상태</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11.5" fill="#5c5b55">
    <rect x="32" y="194" width="656" height="44" rx="6" fill="#f2f1ec"/>
    <text x="48" y="213">content/&lt;id&gt;/</text>
    <text x="48" y="230">  meta.json  →  original.md  →  triage.json  →  card.md  →  <tspan fill="#0d6b4a">cards.json 포함 = 서빙</tspan></text>
  </g>
  <text x="32" y="256" font-size="11.5" fill="#8a8980">원장 파일이 없다. 재개 = 다음 파일이 없는 것만 처리하면 된다.</text>

  <!-- human layer -->
  <text x="32" y="296" font-size="12.5" font-weight="600" fill="#1a1a19">사람이 붙는 자리</text>

  <g>
    <rect x="32" y="306" width="656" height="60" rx="6" fill="#eb6834" opacity="0.08" stroke="#eb6834" stroke-width="1.5"/>
    <text x="48" y="328" font-size="12.5" fill="#1a1a19">관리 콘솔 — 판정과 카드를 보고 <tspan font-weight="600">💬 한 줄 코멘트</tspan>를 남긴다</text>
    <text x="48" y="349" font-size="12" fill="#5c5b55">집필·조립은 사람이 안 본다. 검수만 남았고, 그 검수를 기준으로 흡수시키는 게 이 글의 주제다.</text>
  </g>

  <!-- feedback arrows back -->
  <path d="M283 306 L283 156" stroke="#eb6834" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ax)" opacity="0.75"/>
  <path d="M461 306 L461 156" stroke="#eb6834" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ax)" opacity="0.75"/>

  <text x="32" y="396" font-size="12" fill="#5c5b55">코멘트가 쌓이면 수동으로 개정 도구를 돌린다 — 선별 기준과 집필 기준이 따로 갱신된다.</text>
  <text x="32" y="416" font-size="12" fill="#8a8980">자동 반영은 없다. 사람이 승인해야 기준이 바뀐다.</text>
</svg>
