<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" width="720" height="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif" role="img" aria-label="프롬프트가 1바이트라도 다르면 캐시 breakpoint 앞 43,006 토큰이 통째로 미스된다">
  <rect width="720" height="400" fill="#fcfcfb"/>

  <text x="32" y="34" font-size="17" font-weight="600" fill="#1a1a19">프리픽스 캐시는 바이트 단위로 일치해야 한다</text>
  <text x="32" y="56" font-size="13" fill="#5c5b55">breakpoint 까지 완전히 같아야 히트 — 한 글자만 달라도 앞부분 전체가 미스</text>

  <!-- CASE A -->
  <text x="32" y="94" font-size="13" font-weight="600" fill="#1a1a19">글 경로가 프롬프트 안에 있을 때</text>

  <g>
    <rect x="32" y="106" width="300" height="34" rx="4" fill="#2a78d6" opacity="0.14" stroke="#2a78d6" stroke-width="1.5"/>
    <text x="46" y="128" font-size="12" fill="#1a1a19">시스템 프롬프트 · 도구 · CLAUDE.md</text>

    <rect x="336" y="106" width="150" height="34" rx="4" fill="#e34948" opacity="0.16" stroke="#e34948" stroke-width="1.5"/>
    <text x="350" y="128" font-size="12" font-weight="600" fill="#8f2b2a">글 경로 ← 매번 다름</text>

    <rect x="490" y="106" width="140" height="34" rx="4" fill="#2a78d6" opacity="0.14" stroke="#2a78d6" stroke-width="1.5"/>
    <text x="504" y="128" font-size="12" fill="#1a1a19">나머지 지시</text>

    <!-- breakpoint -->
    <line x1="634" y1="98" x2="634" y2="150" stroke="#4a3aa7" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="640" y="118" font-size="11" fill="#4a3aa7" font-weight="600">break</text>
    <text x="640" y="131" font-size="11" fill="#4a3aa7" font-weight="600">point</text>
  </g>
  <text x="32" y="164" font-size="12.5" fill="#8f2b2a" font-weight="600">→ 미스: 새 입력 27,223 청구</text>

  <!-- CASE B -->
  <text x="32" y="216" font-size="13" font-weight="600" fill="#1a1a19">글 경로를 큐 파일로 뺐을 때</text>

  <g>
    <rect x="32" y="228" width="300" height="34" rx="4" fill="#1baf7a" opacity="0.16" stroke="#1baf7a" stroke-width="1.5"/>
    <text x="46" y="250" font-size="12" fill="#1a1a19">시스템 프롬프트 · 도구 · CLAUDE.md</text>

    <rect x="336" y="228" width="294" height="34" rx="4" fill="#1baf7a" opacity="0.16" stroke="#1baf7a" stroke-width="1.5"/>
    <text x="350" y="250" font-size="12" fill="#1a1a19">지시문 전체 — 글마다 완전히 동일</text>

    <line x1="634" y1="220" x2="634" y2="272" stroke="#4a3aa7" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="640" y="240" font-size="11" fill="#4a3aa7" font-weight="600">break</text>
    <text x="640" y="253" font-size="11" fill="#4a3aa7" font-weight="600">point</text>
  </g>
  <text x="32" y="286" font-size="12.5" fill="#0d6b4a" font-weight="600">→ 히트: 43,006 전량 캐시 · 새 입력 0</text>

  <!-- bottom note -->
  <rect x="32" y="312" width="656" height="60" rx="6" fill="#f2f1ec"/>
  <text x="48" y="336" font-size="12.5" fill="#1a1a19" font-weight="600">담당 글은 어떻게 알려주나</text>
  <text x="48" y="357" font-size="12.5" fill="#5c5b55">큐 디렉토리의 <tspan font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#1a1a19">NN.todo</tspan> 를 <tspan font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#1a1a19">mv</tspan> 로 선점 — 원자적이라 병렬에서도 겹치지 않는다</text>
</svg>
