<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 330" width="720" height="330" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif" role="img" aria-label="총비용은 단가 곱하기 건수 곱하기 재작업률이고, 단가 최적화는 상수배지만 판단 개선은 복리다">
  <rect width="720" height="330" fill="#fcfcfb"/>

  <text x="32" y="36" font-size="17" font-weight="600" fill="#1a1a19">비용은 한 축이 아니었다</text>
  <text x="32" y="58" font-size="13" fill="#5c5b55">단가만 파다가 나머지 두 축을 못 보고 있었다</text>

  <!-- formula -->
  <g font-size="15" font-weight="600">
    <text x="32" y="98" fill="#5c5b55">총비용 =</text>
    <text x="110" y="98" fill="#2a78d6">단가</text>
    <text x="158" y="98" fill="#8a8980">×</text>
    <text x="180" y="98" fill="#eb6834">건수</text>
    <text x="228" y="98" fill="#8a8980">×</text>
    <text x="250" y="98" fill="#4a3aa7">재작업률</text>
  </g>

  <!-- three columns -->
  <g>
    <rect x="32" y="122" width="208" height="176" rx="8" fill="#ffffff" stroke="#2a78d6" stroke-width="1.5"/>
    <rect x="32" y="122" width="208" height="5" rx="2.5" fill="#2a78d6"/>
    <text x="48" y="152" font-size="14" font-weight="600" fill="#1a1a19">단가</text>
    <text x="48" y="174" font-size="12.5" fill="#5c5b55">글 1장을 쓰는 비용</text>
    <text x="48" y="202" font-size="20" font-weight="700" fill="#2a78d6">−37%</text>
    <text x="48" y="222" font-size="12" fill="#5c5b55">72,136 → 45,788</text>
    <text x="48" y="252" font-size="12" font-weight="600" fill="#1a1a19">한계</text>
    <text x="48" y="272" font-size="12" fill="#5c5b55">상수배 개선 · 1회성</text>
    <text x="48" y="289" font-size="12" fill="#5c5b55">바닥을 이미 쳤다</text>

    <rect x="256" y="122" width="208" height="176" rx="8" fill="#ffffff" stroke="#eb6834" stroke-width="1.5"/>
    <rect x="256" y="122" width="208" height="5" rx="2.5" fill="#eb6834"/>
    <text x="272" y="152" font-size="14" font-weight="600" fill="#1a1a19">건수</text>
    <text x="272" y="174" font-size="12.5" fill="#5c5b55">애초에 몇 장을 쓰는가</text>
    <text x="272" y="202" font-size="20" font-weight="700" fill="#eb6834">26.5%</text>
    <text x="272" y="222" font-size="12" fill="#5c5b55">선별 통과율 (실측)</text>
    <text x="272" y="252" font-size="12" font-weight="600" fill="#1a1a19">레버</text>
    <text x="272" y="272" font-size="12" fill="#5c5b55">잘못 통과한 글 하나</text>
    <text x="272" y="289" font-size="12" fill="#5c5b55">= 45K 낭비</text>

    <rect x="480" y="122" width="208" height="176" rx="8" fill="#ffffff" stroke="#4a3aa7" stroke-width="1.5"/>
    <rect x="480" y="122" width="208" height="5" rx="2.5" fill="#4a3aa7"/>
    <text x="496" y="152" font-size="14" font-weight="600" fill="#1a1a19">재작업률</text>
    <text x="496" y="174" font-size="12.5" fill="#5c5b55">쓰고 나서 버리는 비율</text>
    <text x="496" y="202" font-size="20" font-weight="700" fill="#4a3aa7">28%</text>
    <text x="496" y="222" font-size="12" fill="#5c5b55">쓴 카드 중 반려 (실측)</text>
    <text x="496" y="252" font-size="12" font-weight="600" fill="#1a1a19">가장 비싸다</text>
    <text x="496" y="272" font-size="12" fill="#5c5b55">이미 45K를 쓴 뒤에</text>
    <text x="496" y="289" font-size="12" fill="#5c5b55">걸러진 실패</text>
  </g>
</svg>
