<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" width="720" height="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif" role="img" aria-label="사람의 판정 코멘트가 파일로 쌓이고 수동 발동 스킬이 기준 문서를 개정하는 human-on-the-loop 구조">
  <rect width="720" height="380" fill="#fcfcfb"/>

  <text x="32" y="36" font-size="17" font-weight="600" fill="#1a1a19">사람을 루프 안에 두되, 매번 부르지는 않는다</text>
  <text x="32" y="58" font-size="13" fill="#5c5b55">판단은 한 줄 코멘트로 남기고, 기준 개정은 모아서 수동으로</text>

  <defs>
    <marker id="a2" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L8 4 L0 8 z" fill="#8a8980"/>
    </marker>
  </defs>

  <!-- pipeline row -->
  <g font-size="12.5">
    <rect x="32" y="92" width="140" height="52" rx="6" fill="#ffffff" stroke="#d9d8d2" stroke-width="1.5"/>
    <text x="102" y="115" text-anchor="middle" font-weight="600" fill="#1a1a19">선별</text>
    <text x="102" y="133" text-anchor="middle" fill="#5c5b55">bring / skip</text>

    <path d="M178 118 L204 118" stroke="#8a8980" stroke-width="1.5" marker-end="url(#a2)"/>

    <rect x="210" y="92" width="140" height="52" rx="6" fill="#ffffff" stroke="#d9d8d2" stroke-width="1.5"/>
    <text x="280" y="115" text-anchor="middle" font-weight="600" fill="#1a1a19">집필</text>
    <text x="280" y="133" text-anchor="middle" fill="#5c5b55">카드 · 45K</text>

    <path d="M356 118 L382 118" stroke="#8a8980" stroke-width="1.5" marker-end="url(#a2)"/>

    <rect x="388" y="92" width="140" height="52" rx="6" fill="#ffffff" stroke="#d9d8d2" stroke-width="1.5"/>
    <text x="458" y="115" text-anchor="middle" font-weight="600" fill="#1a1a19">서빙 · 리뷰</text>
    <text x="458" y="133" text-anchor="middle" fill="#5c5b55">보류 / 반려</text>
  </g>

  <!-- human comments down -->
  <g>
    <path d="M102 150 L102 186" stroke="#eb6834" stroke-width="1.5" marker-end="url(#a2)"/>
    <path d="M280 150 L280 186" stroke="#eb6834" stroke-width="1.5" marker-end="url(#a2)"/>
    <path d="M458 150 L458 186" stroke="#eb6834" stroke-width="1.5" marker-end="url(#a2)"/>
    <text x="480" y="172" font-size="11.5" fill="#eb6834" font-weight="600">💬 한 줄 코멘트</text>
  </g>

  <!-- storage -->
  <rect x="32" y="192" width="496" height="46" rx="6" fill="#eb6834" opacity="0.1" stroke="#eb6834" stroke-width="1.5"/>
  <text x="48" y="212" font-size="12.5" font-weight="600" fill="#1a1a19">content/&lt;id&gt;/feedback.json</text>
  <text x="48" y="230" font-size="12" fill="#5c5b55">stage 는 그 순간 상태에서 자동 도출 — 어느 화면에서 눌렀는지가 곧 stage</text>

  <!-- manual trigger -->
  <path d="M280 244 L280 274" stroke="#4a3aa7" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="292" y="264" font-size="11.5" fill="#4a3aa7" font-weight="600">사람이 수동 발동 · 3건 미만이면 거부</text>

  <!-- skills -->
  <g font-size="12.5">
    <rect x="32" y="280" width="238" height="66" rx="6" fill="#ffffff" stroke="#4a3aa7" stroke-width="1.5"/>
    <text x="48" y="302" font-weight="600" fill="#1a1a19">/rubric-tune</text>
    <text x="48" y="322" fill="#5c5b55">stage: triage 코멘트 →</text>
    <text x="48" y="339" fill="#5c5b55">taste-rubric.md 게이트 개정</text>

    <rect x="290" y="280" width="238" height="66" rx="6" fill="#ffffff" stroke="#4a3aa7" stroke-width="1.5"/>
    <text x="306" y="302" font-weight="600" fill="#1a1a19">/writing-tune</text>
    <text x="306" y="322" fill="#5c5b55">stage: write + 반려 사유 →</text>
    <text x="306" y="339" fill="#5c5b55">writing-policy.md 개정</text>
  </g>

  <!-- measurement rail -->
  <rect x="548" y="92" width="140" height="254" rx="6" fill="#1baf7a" opacity="0.09" stroke="#1baf7a" stroke-width="1.5"/>
  <text x="618" y="118" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0d6b4a">계측</text>
  <text x="618" y="142" text-anchor="middle" font-size="11.5" fill="#5c5b55">precision.py</text>
  <text x="562" y="176" font-size="11.5" fill="#5c5b55">개정 전후로</text>
  <text x="562" y="193" font-size="11.5" fill="#5c5b55">스냅샷을 찍는다</text>
  <text x="562" y="222" font-size="11.5" fill="#5c5b55">append-only 라</text>
  <text x="562" y="239" font-size="11.5" fill="#5c5b55">기준선이 안 덮인다</text>
  <text x="562" y="276" font-size="11.5" font-weight="600" fill="#0d6b4a">없으면 개정이</text>
  <text x="562" y="293" font-size="11.5" font-weight="600" fill="#0d6b4a">개선인지 개악인지</text>
  <text x="562" y="310" font-size="11.5" font-weight="600" fill="#0d6b4a">영영 모른다</text>
</svg>
