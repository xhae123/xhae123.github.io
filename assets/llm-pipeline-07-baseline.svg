<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" width="720" height="280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif" role="img" aria-label="기준선 실측: 선별 통과율 26.5퍼센트, bring 정밀도 71.8퍼센트, 집필 수용률 42.3퍼센트">
  <rect width="720" height="280" fill="#fcfcfb"/>

  <text x="32" y="36" font-size="17" font-weight="600" fill="#1a1a19">기준선 — 개정 전에 찍어둔 값</text>
  <text x="32" y="58" font-size="13" fill="#5c5b55">판정 294건(bring 78 / skip 216) 기준 · 이 값이 나중의 비교 대상이 된다</text>

  <!-- three metric rows -->
  <g>
    <!-- 1 -->
    <text x="32" y="102" font-size="13" fill="#1a1a19">선별 통과율</text>
    <rect x="150" y="88" width="440" height="18" rx="4" fill="#e8e7e1"/>
    <rect x="150" y="88" width="116.6" height="18" rx="4" fill="#2a78d6"/>
    <text x="602" y="102" font-size="14" font-weight="700" fill="#1a1a19">26.5%</text>
    <text x="150" y="124" font-size="11.5" fill="#5c5b55">낮은 게 나쁜 게 아니다 — 걸러내는 게 일이다. 급변하면 게이트가 흔들렸다는 신호</text>

    <!-- 2 (star) -->
    <text x="32" y="166" font-size="13" font-weight="700" fill="#1a1a19">bring 정밀도</text>
    <rect x="150" y="152" width="440" height="18" rx="4" fill="#e8e7e1"/>
    <rect x="150" y="152" width="315.9" height="18" rx="4" fill="#4a3aa7"/>
    <text x="602" y="166" font-size="14" font-weight="700" fill="#1a1a19">71.8%</text>
    <text x="150" y="188" font-size="11.5" fill="#4a3aa7" font-weight="600">★ 핵심 지표 — 나머지 28%는 이미 45K를 쓰고 버린 것</text>

    <!-- 3 -->
    <text x="32" y="230" font-size="13" fill="#1a1a19">집필 수용률</text>
    <rect x="150" y="216" width="440" height="18" rx="4" fill="#e8e7e1"/>
    <rect x="150" y="216" width="186.1" height="18" rx="4" fill="#1baf7a"/>
    <text x="602" y="230" font-size="14" font-weight="700" fill="#1a1a19">42.3%</text>
    <text x="150" y="252" font-size="11.5" fill="#5c5b55">서빙까지 간 비율 (조립 대기 23건이 아직 분모에 남아 있어 낮게 잡힌다)</text>
  </g>
</svg>
